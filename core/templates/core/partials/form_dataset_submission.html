{% load i18n %}

<form id="form_id_dataset" enctype="multipart/form-data"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
      hx-encoding="multipart/form-data" hx-get="{% url 'core:clear_form_dataset_submission' dataset.id %}" hx-trigger="dataset_files_updated from:body" class="mb-2">

    <div id="div_id_files" class="mb-3">
        <label for="id_files" class="form-label">
            Upload Files
        </label>
        <div><input type="file" name="files" class="form-control" multiple="" id="id_files"> </div>
    </div>

    <input type="hidden" name="submitted_by" value="{{ request.user.pk }}" />

    <button id="btn_id_form_submit" type="button" title="{% trans 'Upload attached files' %}"
            hx-swap="none"
            hx-post="{% url 'core:submit_dataset_files' dataset.id %}" class="btn btn-primary"
            hx-indicator="#htmx_indicator_dataset_files_list">
        <span class="bi bi-check-square me-2"></span>{% trans 'Upload Selected Files' %}
    </button>
</form>
